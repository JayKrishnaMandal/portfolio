<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | JKChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-body: #f4f7fe; --bg-sidebar: #ffffff; 
            --primary: #4318FF; --text-main: #2B3674; --text-sub: #A3AED0;
            --danger: #EE5D50; --success: #05CD99;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* LOGIN OVERLAY */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg-body); z-index: 50; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(112, 144, 176, 0.12); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { margin-bottom: 10px; font-weight: 700; color: var(--text-main); }
        .login-card p { color: var(--text-sub); margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-main); margin-bottom: 8px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #E0E5F2; outline: none; transition: 0.3s; color: var(--text-main); }
        input:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 15px; border-radius: 10px; background: var(--primary); color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #3311CC; }

        /* MAIN LAYOUT */
        .sidebar { width: 280px; background: var(--bg-sidebar); padding: 30px; display: flex; flex-direction: column; border-right: 1px solid #F4F7FE; }
        .brand { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .brand i { color: var(--primary); }
        .nav-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; color: var(--text-sub); display: flex; align-items: center; gap: 12px; font-weight: 500; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(67, 24, 255, 0.05); color: var(--primary); border-right: 4px solid var(--primary); }
        .nav-item i { width: 20px; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 14px; color: var(--text-sub); margin-bottom: 5px; }
        .page-header { font-size: 32px; font-weight: 700; }

        /* CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 17px; }
        .stat-icon { width: 56px; height: 56px; border-radius: 50%; background: #F4F7FE; display: flex; justify-content: center; align-items: center; color: var(--primary); font-size: 24px; }
        .stat-info .label { font-size: 14px; color: var(--text-sub); }
        .stat-info .value { font-size: 24px; font-weight: 700; margin-top: 5px; }

        /* TABLES & LISTS */
        .card-container { background: white; border-radius: 20px; padding: 20px; min-height: 400px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 20px; font-weight: 700; }
        
        .room-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #F4F7FE; }
        .room-row:last-child { border-bottom: none; }
        .room-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .room-info p { font-size: 12px; color: var(--text-sub); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge.active { background: rgba(5, 205, 153, 0.1); color: var(--success); }
        
        .actions button { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; justify-content: center; align-items: center; margin-left: 8px; transition: 0.2s; }
        .btn-view { background: #F4F7FE; color: var(--text-main); }
        .btn-delete { background: rgba(238, 93, 80, 0.1); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* VIEWS */
        .tab-view { display: none; }
        .tab-view.active { display: block; }
    </style>
</head>
<body>

<!-- AUTH SCREEN -->
    <div id="loginOverlay">
        <div class="login-card">
            <h2>Admin Portal</h2>
            <p>Secure Database Access</p>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="adminKey" placeholder="••••••••">
            </div>
            <button class="btn-primary" id="btnLogin">Unlock Dashboard</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-bolt"></i> JKChat
        </div>
        <nav>
            <div class="nav-item active" onclick="switchTab('dashboard')">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </div>
            <div class="nav-item" onclick="switchTab('rooms')">
                <i class="fa-solid fa-layer-group"></i> Rooms
            </div>
            <div class="nav-item" onclick="switchTab('users')">
                <i class="fa-solid fa-users"></i> Users
            </div>
            <div class="nav-item" onclick="switchTab('settings')">
                <i class="fa-solid fa-sliders"></i> Settings
            </div>
        </nav>
        <div style="margin-top:auto">
            <div class="nav-item" style="color:var(--danger)" onclick="location.reload()">
                <i class="fa-solid fa-right-from-bracket"></i> Lock Session
            </div>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="main-content">
        <div class="header">
            <div>
                <div class="page-title">Pages / <span id="breadCrumb">Dashboard</span></div>
                <h1 class="page-header" id="headerTitle">Main Dashboard</h1>
            </div>
        </div>

        <!-- TAB: DASHBOARD -->
        <div id="view-dashboard" class="tab-view active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-users-viewfinder"></i></div>
                    <div class="stat-info"><div class="label">Total Rooms</div><div class="value" id="statRooms">0</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-comments"></i></div>
                    <div class="stat-info"><div class="label">Total Messages</div><div class="value" id="statMessages">0</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                    <div class="stat-info"><div class="label">Total Users</div><div class="value" id="statUsers">0</div></div>
                </div>
            </div>
            <div class="card-container">
                <div class="card-header">
                    <span class="card-title">Recent Activity</span>
                    <button class="btn-primary" style="width:auto; padding:10px 20px;" onclick="refreshData()">Refresh</button>
                </div>
                <div id="recentList">
                    <p style="color:var(--text-sub); text-align:center;">Loading...</p>
                </div>
            </div>
        </div>

        <!-- TAB: ROOMS -->
        <div id="view-rooms" class="tab-view">
             <div class="card-container">
                <div class="card-header">
                    <span class="card-title">All Rooms</span>
                </div>
                <div id="roomListFull"></div>
            </div>
        </div>

        <!-- TAB: USERS -->
        <div id="view-users" class="tab-view">
             <div class="card-container">
                <div class="card-header">
                    <span class="card-title">Registered Users</span>
                </div>
                <div id="userListFull"></div>
            </div>
        </div>

        <!-- TAB: SETTINGS -->
        <div id="view-settings" class="tab-view">
            <div class="card-container" style="max-width:600px;">
                <div class="card-header">
                    <span class="card-title">Security Settings</span>
                </div>
                <div class="input-group">
                    <label>Update Super Admin Key</label>
                    <input type="text" id="newAdminKey" placeholder="Enter new password">
                </div>
                <button class="btn-primary" id="btnUpdateSecurity">Update Key</button>
            </div>
        </div>

    </main>

    <script type="module" src="admin.js"></script>
    <script>
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Find nav item by text content approx or index
            const navs = document.querySelectorAll('.nav-item');
            if(tab === 'dashboard') navs[0].classList.add('active');
            if(tab === 'rooms') navs[1].classList.add('active');
            if(tab === 'users') navs[2].classList.add('active');
            if(tab === 'settings') navs[3].classList.add('active');
            
            document.getElementById(`view-${tab}`).classList.add('active');
            
            const titles = { 'dashboard': 'Main Dashboard', 'rooms': 'Room Manager', 'users': 'User Manager', 'settings': 'System Settings' };
            document.getElementById('headerTitle').innerText = titles[tab];
            document.getElementById('breadCrumb').innerText = titles[tab].split(' ')[0];
        };
    </script>
</body>
</html>
